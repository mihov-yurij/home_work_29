<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title> Test</title>
</head>
<body>
  <input type="number" id="ageInput" step="0.01" placeholder="Введіть вік">
  <button id="checkBtn">Перевірити</button>

  <p id="result"></p>

  <script type="module">
    import { ageClassification } from './js/ageClassification.js';

    const input = document.getElementById('ageInput');
    const button = document.getElementById('checkBtn');
    const result = document.getElementById('result');

    button.addEventListener('click', () => {
      const value = Number(input.value);
      const classification = ageClassification(value);

      result.textContent = classification === null
        ? 'Невірне значення'
        : `Категорія: ${classification}`;
    });
  </script>
  <script> import { describe } from './js/ageClassificationTest.js';</script>
</body>
</html>
